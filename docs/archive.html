<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Past mornings · everydaypassion</title>
  <link rel="stylesheet" href="/everydaypassion/static/app.css">
  <script>
    // Apply a pinned theme before first paint to avoid a flash.
    (function () {
      try {
        var t = localStorage.getItem("edp-theme");
        if (t) document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <span><a href="/everydaypassion/">everydaypassion</a></span>
      <span class="links">
        <a href="/everydaypassion/archive.html">past mornings</a>
        
        <button class="theme-toggle" id="theme-toggle" type="button">theme</button>
      </span>
    </div>
    
<h1 class="page-title">Past mornings</h1>

<ul class="entries">
  
  <li>
    <a href="/everydaypassion/day/2026-06-22.html">
      <span class="when">Monday · 22 June 2026</span>
      
    </a>
  </li>
  
  <li>
    <a href="/everydaypassion/day/2026-06-21.html">
      <span class="when">Sunday · 21 June 2026</span>
      
    </a>
  </li>
  
  <li>
    <a href="/everydaypassion/day/2026-06-20.html">
      <span class="when">Saturday · 20 June 2026</span>
      
    </a>
  </li>
  
</ul>


  </div>
  <script>
    (function () {
      var btn = document.getElementById("theme-toggle");
      if (!btn) return;
      btn.addEventListener("click", function () {
        var cur = document.documentElement.getAttribute("data-theme");
        // No pin yet → follow whatever the OS shows, then flip to the opposite.
        var isDark = cur
          ? cur === "dark"
          : window.matchMedia("(prefers-color-scheme: dark)").matches;
        var next = isDark ? "paper" : "dark";
        document.documentElement.setAttribute("data-theme", next);
        try { localStorage.setItem("edp-theme", next); } catch (e) {}
      });
    })();
  </script>
</body>
</html>
