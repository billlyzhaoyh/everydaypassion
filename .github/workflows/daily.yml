name: Daily morning

# Builds today's public (CC0-only) package and commits it to docs/, which
# GitHub Pages serves at https://<user>.github.io/everydaypassion/.
# The archive accumulates because past day/*.html files stay committed.

on:
  schedule:
    - cron: "0 6 * * *" # 06:00 UTC daily
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-morning
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Export today's public site
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: uv run --extra web --extra llm everydaypassion export --out docs --base-url /everydaypassion/

      - name: Commit the new morning
        run: |
          git config user.name "everydaypassion-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          git diff --staged --quiet || git commit -m "Daily morning: $(date -u +%F)"
          git push
